<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUL // STORE</title>
    <style>
        /* --- СБРОС И БАЗА --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #333;
            --hover-color: #fff;
            --font-main: 'Courier New', Courier, monospace; /* Техно-стиль */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        ul {
            list-style: none;
        }

        /* --- ХЕДЕР --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--accent-color);
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .logo span {
            color: #666;
        }

        nav ul {
            display: flex;
            gap: 30px;
        }

        nav a:hover {
            color: #666;
            text-decoration: line-through;
        }

        /* --- ГЛАВНЫЙ БАННЕР (HERO) --- */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -5px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .hero p {
            font-size: 1rem;
            color: #666;
            max-width: 400px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- КАТАЛОГ КАТЕГОРИЙ --- */
        .catalog-section {
            padding: 50px 40px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before, .section-title::after {
            content: '';
            height: 1px;
            background: #333;
            flex-grow: 1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* --- КАРТОЧКА ТОВАРА/КАТЕГОРИИ --- */
        .card {
            border: 1px solid var(--accent-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            height: 300px;
            overflow: hidden;
        }

        .card:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .card-symbol {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .card-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .card-count {
            font-size: 0.8rem;
            margin-top: 10px;
            opacity: 0.5;
        }

        /* Декоративные элементы на карточках */
        .card::before {
            content: '†';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1rem;
            opacity: 0.3;
        }

        .card:hover .card-symbol {
            transform: scale(1.1);
        }

        /* --- ФУТЕР --- */
        footer {
            border-top: 1px solid var(--accent-color);
            padding: 40px;
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #444;
        }

        .footer-links a {
            margin-left: 20px;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            header { padding: 20px; }
            .grid-container { grid-template-columns: 1fr; }
            .card { height: 200px; }
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
    <a href="{% url 'home' %}" class="logo">SOUL<span>//</span>STORE</a>
    <nav>
        <ul>
            <li><a href="{% url 'about' %}">О НАС</a></li>
            <li>
                <a href="{% url 'cart_detail' %}" style="position: relative;">
                    КОРЗИНА
                    {% if cart|length > 0 %}
                    <span style="position:absolute; top:-8px; right:-10px; background:#fff; color:#000; font-size:0.65rem; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        {{ cart|length }}
                    </span>
                    {% endif %}
                </a>
            </li>
        </ul>
    </nav>
</header>

    <!-- Главный экран -->
    <section class="hero">
        <h1>NO SIGNAL</h1>
        <p>ОДЕЖДА ДЛЯ ТЕХ, КТО НЕ СЛЫШИТ ШУМ ТОЛПЫ.</p>
        <div class="scroll-indicator">▼</div>
    </section>

    <!-- Сетка категорий -->
    <main class="catalog-section">
        <div class="section-title">ВЫБЕРИТЕ СВОЙ ПУТЬ</div>

        <div class="grid-container">
            
             <!-- Категория 1: КОЛЬЦА -->
            <a href="{% url 'rings' %}" class="card">
                <div class="card-symbol">☾</div>
                <div class="card-title">RINGS</div>
                <div class="card-count">КОЛЬЦА</div>
            </a>

            <!-- Категория 2: МАЙКИ -->
            <a href="{% url 'tees' %}" class="card">
                <div class="card-symbol">✖</div>
                <div class="card-title">TEES</div>
                <div class="card-count">МАЙКИ</div>
            </a>

            <!-- Категория 3: КОФТЫ -->
            <a href="{% url 'hoodies' %}" class="card">
                <div class="card-symbol">▲</div>
                <div class="card-title">HOODIES</div>
                <div class="card-count">КОФТЫ</div>
            </a>

            <!-- Категория 4: ПОДВЕСКИ -->
            <a href="{% url 'pendants' %}" class="card">
                <div class="card-symbol">†</div>
                <div class="card-title">PENDANTS</div>
                <div class="card-count">ПОДВЕСКИ</div>
            </a>

            <!-- Категория 5: КУРТКИ -->
            <a href="{% url 'outerwear' %}" class="card">
                <div class="card-symbol">⛓</div>
                <div class="card-title">OUTERWEAR</div>
                <div class="card-count">КУРТКИ</div>
            </a>

        </div>
    </main>

    <!-- Подвал -->
    <footer>
        <div class="copyright">
            © 2025 SOUL STORE. EST. MMXXIII
        </div>
            <a href="#">TELEGRAM</a>
        </div>
    </footer>

</body>
</html>
